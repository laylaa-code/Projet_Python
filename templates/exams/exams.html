{% extends 'base.html' %}
{% block content %}
<div class="page-header d-sm-flex d-block align-items-center justify-content-between">
    <h3 class="mb-0">Exams</h3>
    <a href="{% url 'add_exam' %}" class="btn btn-primary mb-3">Add Exam</a>
</div>
<div class="card">
    <div class="card-body">
        <div class="table-responsive">
            <table class="table table-striped table-hover mb-0">
                <thead class="thead-light">
                    <tr>
                        <th>Name</th>
                        <th>Subject</th>
                        <th>Date</th>
                        <th>Max Marks</th>
                        <th class="text-end">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    {% for e in exams %}
                    <tr>
                        <td>{{ e.name }}</td>
                        <td>{{ e.subject }}</td>
                        <td>{{ e.date }}</td>
                        <td>{{ e.max_marks }}</td>
                        <td class="text-end">
                            <a href="{% url 'edit_exam' e.id %}" class="btn btn-warning btn-sm me-1">Edit</a>
                            <a href="{% url 'delete_exam' e.id %}" class="btn btn-danger btn-sm">Delete</a>
                        </td>
                    </tr>
                    {% empty %}
                    <tr>
                        <td colspan="5" class="text-center">No exams available.</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
