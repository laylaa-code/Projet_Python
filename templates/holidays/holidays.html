{% extends 'base.html' %}
{% block content %}
<div class="page-header d-sm-flex d-block align-items-center justify-content-between">
    <h3 class="mb-0">Holidays</h3>
    <a href="{% url 'add_holiday' %}" class="btn btn-primary mb-3">Add Holiday</a>
</div>
<div class="card">
    <div class="card-body">
        <div class="table-responsive">
            <table class="table table-striped table-hover mb-0">
                <thead class="thead-light">
                    <tr>
                        <th>Title</th>
                        <th>Start</th>
                        <th>End</th>
                        <th class="text-end">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    {% for h in holidays %}
                    <tr>
                        <td>{{ h.title }}</td>
                        <td>{{ h.start_date }}</td>
                        <td>{{ h.end_date }}</td>
                        <td class="text-end">
                            <a href="{% url 'edit_holiday' h.id %}" class="btn btn-warning btn-sm me-1">Edit</a>
                            <a href="{% url 'delete_holiday' h.id %}" class="btn btn-danger btn-sm">Delete</a>
                        </td>
                    </tr>
                    {% empty %}
                    <tr>
                        <td colspan="4" class="text-center">No holidays available.</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
