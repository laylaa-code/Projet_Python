{% extends 'base.html' %}
{% block content %}

<div class="card">
  <div class="card-header">
    <h3>Edit Holiday</h3>
  </div>
  <div class="card-body">
    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label for="title" class="form-label">Title</label>
        <input type="text" name="title" class="form-control" value="{{ holiday.title }}" required>
      </div>
      <div class="mb-3">
        <label for="start_date" class="form-label">Start Date</label>
        <input type="date" name="start_date" class="form-control" value="{{ holiday.start_date }}" required>
      </div>
      <div class="mb-3">
        <label for="end_date" class="form-label">End Date</label>
        <input type="date" name="end_date" class="form-control" value="{{ holiday.end_date }}" required>
      </div>
      <div class="mb-3">
        <label for="description" class="form-label">Description</label>
        <textarea name="description" class="form-control" rows="3">{{ holiday.description }}</textarea>
      </div>
      <button type="submit" class="btn btn-success">Update Holiday</button>
      <a href="{% url 'holidays' %}" class="btn btn-secondary">Cancel</a>
    </form>
  </div>
</div>

{% endblock %}
