{% extends 'base.html' %}
{% block content %}
<div class="page-header d-sm-flex d-block align-items-center justify-content-between">
    <h3 class="mb-0">Time Table</h3>
    <a href="{% url 'add_timetable' %}" class="btn btn-primary mb-3">Add Time Table Entry</a>
</div>
<div class="card">
    <div class="card-body">
        <div class="table-responsive">
            <table class="table table-striped table-hover mb-0">
                <thead class="thead-light">
                    <tr>
                        <th>Day</th>
                        <th>Subject</th>
                        <th>Start</th>
                        <th>End</th>
                        <th class="text-end">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    {% for t in data %}
                    <tr>
                        <td>{{ t.day }}</td>
                        <td>{{ t.subject }}</td>
                        <td>{{ t.start_time }}</td>
                        <td>{{ t.end_time }}</td>
                        <td class="text-end">
                            <a href="{% url 'edit_timetable' t.id %}" class="btn btn-warning btn-sm me-1">Edit</a>
                            <a href="{% url 'delete_timetable' t.id %}" class="btn btn-danger btn-sm">Delete</a>
                        </td>
                    </tr>
                    {% empty %}
                    <tr>
                        <td colspan="5" class="text-center">No timetable entries available.</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
